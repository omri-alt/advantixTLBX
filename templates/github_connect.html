<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Connection</title>
  <style>
    body { font-family: Inter, Segoe UI, Arial, sans-serif; margin: 0; background: #0b1020; color: #eaf1fb; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    .card { border: 1px solid #2a3654; border-radius: 12px; padding: 14px; background: #121a2b; margin-bottom: 12px; }
    .muted { color: #9aa4b2; }
    pre { white-space: pre-wrap; overflow-wrap: anywhere; background: #0d1426; border: 1px solid #2a3654; padding: 10px; border-radius: 10px; }
    .btn { display: inline-block; margin-top: 10px; padding: 8px 12px; border: 1px solid #2a3654; border-radius: 10px; text-decoration: none; color: #eaf1fb; background: #17223a; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>GitHub Connection</h1>
    <div class="muted">MVP status page for git + GitHub CLI connectivity.</div>

    <div class="card">
      <strong>Repository detected:</strong> {{ "Yes" if git_exists else "No (.git not found)" }}
    </div>

    <div class="card">
      <strong>Git remotes</strong>
      <pre>{{ remotes or "No remotes configured yet." }}</pre>
    </div>

    <div class="card">
      <strong>GitHub CLI auth status</strong>
      <pre>{{ gh_status or "No output." }}</pre>
    </div>

    <a class="btn" href="/">Back to Home</a>
  </div>
</body>
</html>
